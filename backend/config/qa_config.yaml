# -*- coding: utf-8 -*-
# DeepDoc问答系统配置文件
# 此配置文件定义了系统的各种参数和规则

# =============================================================================
# 答案格式配置
# =============================================================================
answer_format:
  # 直接回答最大长度（字符数）
  max_direct_answer_length: 50

  # 详细说明最小长度（字符数）
  min_detailed_explanation_length: 30

  # 必需的格式章节
  required_sections:
    - "【直接回答】"
    - "【详细说明】"
    - "【数据来源】"

  # 禁止在【数据来源】中嵌套的格式标记
  forbidden_nested_formats:
    - "【直接回答】"
    - "【详细说明】"
    - "【数据来源】"

# =============================================================================
# 内容验证配置
# =============================================================================
content_validation:
  # 禁止使用的模糊表述
  forbidden_phrases:
    - "不知道"
    - "不清楚"
    - "无法回答"
    - "不能确定"

  # 允许的模糊表述（在特定上下文中）
  allowed_phrases_with_context:
    - phrase: "可能"
      context: "文档中未明确提及"
    - phrase: "大概"
      context: "根据现有资料推测"

  # 要求必须有数据来源
  require_data_source: true

  # 要求必须有证据支持
  require_evidence: true

# =============================================================================
# 验证阈值配置
# =============================================================================
validation_thresholds:
  # 最低合格分数（0-100）
  min_acceptable_score: 60

  # 严重问题扣分
  critical_penalty: 20

  # 警告问题扣分
  warning_penalty: 10

  # 最多显示的约束条件数量
  max_constraints_shown: 10

  # 最多显示的表格数量
  max_tables_shown: 3

# =============================================================================
# Phase 2 优化配置 (2026-03-11)
# =============================================================================
phase2_validation:
  # 重复率检查
  repetition_check:
    enabled: true
    max_repetition_ratio: 0.3  # 最大允许重复率30%
    action_on_exceed: "warn"  # warn, rewrite, reject

  # 列表完整性检查
  list_completeness_check:
    enabled: true
    min_items_for_list: 2  # 至少2个项目才算列表
    max_missing_ratio: 0.3  # 超过30%缺失则警告，超过50%则拒绝
    action_on_exceed: "reject"

  # 时间周期准确性检查
  time_period_check:
    enabled: true
    strict_mode: true  # 严格模式：任何不一致都拒绝

  # 直接回答长度强制检查
  direct_answer_length_check:
    enabled: true
    max_length: 50  # 字符数
    hard_limit: 80  # 硬限制
    action_on_exceed: "warn"  # warn, rewrite

# =============================================================================
# Phase 2 约束模式增强
# =============================================================================
phase2_constraints:
  # 列表类约束模式
  list_patterns:
    - pattern: "指定([^。：]+?)[：:]\\s*([^。\\n]+)"
      type: "designated_list"
      priority: "high"

    - pattern: "([^。：]{2,10}?)[：:]\\s*([^\\n、,]+[、,][^\\n、,]+(?:[、,][^\\n、,]+)*)"
      type: "list_items"
      priority: "high"

    - pattern: "选择(?:其中)?一个办理[：:]\\s*([^。\\n]+)"
      type: "choice_list"
      priority: "medium"

    - pattern: "有([^。]{2,15}?)[、,]([^。]+?)(?:等|等[者业务产品])"
      type: "etc_list"
      priority: "medium"

  # 时间周期模式
  time_period_patterns:
    - pattern: "T\\+(\\d+)\\s*至\\s*T\\+(\\d+)"
      type: "t_range"
      priority: "high"

    - pattern: "连续\\s*(\\d+)\\s*个月"
      type: "consecutive_months"
      priority: "high"

    - pattern: "各\\s*发放\\s*(\\d+)%"
      type: "percentage_each"
      priority: "medium"

  # 实体模式增强
  enhanced_entities:
    value_added_services:
      pattern: "(?:数智生活包|健康(?:黄金|钻石)?会员|全国亲情网|统付版家庭网|中国移动云盘|综合意外保障|视频彩铃)"
      priority: "high"

    time_expressions:
      pattern: "(?:T\\+\\d+|\\d+天内|\\d+个月内|新入网|激活后)"
      priority: "medium"

# =============================================================================
# 约束条件提取配置
# =============================================================================
constraint_extraction:
  # 约束模式列表
  patterns:
    # 仅限类
    - pattern: "([^。\n]+?)仅限([^。\n]+?)(?:办理|使用|享受)"
      type: "exclusive"
      priority: "high"

    # 条件类
    - pattern: "([^。\n]+?)才可([^。\n]+?)(?:办理|使用|享受)"
      type: "conditional"
      priority: "high"

    - pattern: "需([^。\n]+?)(?:后)?才([^。\n]+?)(?:办理|使用|享受)"
      type: "conditional"
      priority: "high"

    - pattern: "([^。\n]+?)要求([^。\n]+?)(?:办理|使用|享受)"
      type: "conditional"
      priority: "medium"

    # 排除类
    - pattern: "([^。\n]+?)(?:不|非)(?:参与|适用|包含)([^。\n]+?)"
      type: "exclusion"
      priority: "high"

    # 门槛类
    - pattern: "([^。\n]+?)(?:及以上|以上|不低于)([^。\n]+?)"
      type: "threshold_min"
      priority: "medium"

    - pattern: "([^。\n]+?)(?:及以下|以下|不高于)([^。\n]+?)"
      type: "threshold_max"
      priority: "medium"

    # 时间限制
    - pattern: "([^。\n]+?)(?:天内|个月内|[^。]+?内)(?:办理|使用|享受)"
      type: "time_limit"
      priority: "medium"

    # 数值关系
    - pattern: "([^。\n]+?)为([^。\n]+?)(?:元|个|GB|MB|%)"
      type: "numeric_value"
      priority: "low"

  # 实体识别模式
  entity_patterns:
    package:
      pattern: "(?:29|39|49|59|69|79|89|99|129|149)\\s*(?:元)?(?:潮玩青春卡|全家享|融合套餐)"
      priority: "high"

    product:
      pattern: "(?:数智生活包|健康(?:黄金|钻石)?会员|全国亲情网|统付版家庭网|综合意外保障)"
      priority: "medium"

    channel:
      pattern: "(?:校园渠道|校园微格|区域服务商|全业务渠道|核心厅店|社会渠道)"
      priority: "high"

    card_type:
      pattern: "(?:万能副卡|主卡|副卡|副号)"
      priority: "high"

    incentive:
      pattern: "(?:套餐分成|首充手续费|实名手续费|服务运营激励|阶段达量积分)"
      priority: "high"

  # 约束验证规则
  validation_rules:
    exclusive:
      check_keywords: ["可以", "支持", "能够", "允许", "办理"]
      confirmation_keywords: ["满足", "符合", "达到", "具备"]
      action: "reject_if_condition_not_confirmed"

    exclusion:
      check_keywords: ["包含", "支持", "可以"]
      action: "reject_if_excluded_mentioned"

    threshold_min:
      action: "verify_value_meets_threshold"

    threshold_max:
      action: "verify_value_within_limit"

# =============================================================================
# 表格解析配置
# =============================================================================
table_parsing:
  # 表格类型定义
  table_types:
    package_comparison:
      name: "套餐对比表"
      primary_keywords:
        - "套餐"
        - "价格"
        - "资费"
        - "流量"
        - "通话"
        - "方案ID"
      secondary_keywords:
        - "潮玩青春卡"
        - "全家享"
        - "融合套餐"
        - "对比"
      priority: "high"

    fee_calculation:
      name: "费用计算表"
      primary_keywords:
        - "费用"
        - "计算"
        - "T+"
        - "合计"
        - "分成"
        - "激励"
      secondary_keywords:
        - "首充"
        - "实名"
        - "套餐分成"
        - "达量"
      priority: "high"

    incentive_plan:
      name: "激励方案表"
      primary_keywords:
        - "星级"
        - "门槛"
        - "激励"
        - "达量"
        - "完成"
      secondary_keywords:
        - "考核"
        - "标准"
        - "达标"
      priority: "medium"

    service_rule:
      name: "服务规则表"
      primary_keywords:
        - "规则"
        - "条件"
        - "要求"
        - "标准"
        - "说明"
      secondary_keywords:
        - "办理"
        - "使用"
        - "享受"
        - "适用"
      priority: "medium"

    channel_policy:
      name: "渠道政策表"
      primary_keywords:
        - "渠道"
        - "政策"
        - "范围"
        - "类型"
      secondary_keywords:
        - "区域"
        - "服务商"
        - "厅店"
        - "校园"
      priority: "medium"

  # 列类型推断规则
  column_patterns:
    package_name:
      pattern: "(?:套餐名称|方案|产品)"
      data_type: "string"

    price:
      pattern: "(?:价格|资费|月租|费用)"
      data_type: "currency"

    data:
      pattern: "(?:流量|通话|分钟|GB|MB)"
      data_type: "data_size"

    fee:
      pattern: "(?:手续费|分成|激励)"
      data_type: "currency"

    channel:
      pattern: "(?:渠道|门店|区域)"
      data_type: "string"

    incentive:
      pattern: "(?:星级|门槛|达量)"
      data_type: "string"

  # 表格行分隔符优先级
  delimiters:
    - "|"
    - "\t"
    - "："
    - ";"

# =============================================================================
# 提示词配置
# =============================================================================
prompt_config:
  # 系统提示词模板路径
  system_prompt_template: "prompts/system_prompt.txt"

  # 用户提示词模板路径
  user_prompt_template: "prompts/user_prompt.txt"

  # 约束条件提示词模板
  constraints_template: "prompts/constraints_template.txt"

  # 表格数据提示词模板
  tables_template: "prompts/tables_template.txt"

  # 最大上下文长度
  max_context_length: 8000

  # 聊天历史清理策略
  chat_history_cleaning:
    enabled: true
    max_history_items: 10
    assistant_max_length: 100
    remove_format_markers: true

# =============================================================================
# 模型配置
# =============================================================================
model_config:
  # 主模型（生成答案）
  primary_model:
    name: "qwen2.5:14b"
    provider: "ollama"
    temperature: 0.3
    max_tokens: 2000

  # 轻量模型（快速验证）
  light_model:
    name: "qwen2.5:7b"
    provider: "ollama"
    temperature: 0.1
    max_tokens: 500

  # 重试配置
  retry:
    max_retries: 3
    retry_delay: 1
    backoff_factor: 2

# =============================================================================
# 向量检索配置
# =============================================================================
retrieval_config:
  # 向量数据库
  vector_db:
    provider: "qdrant"
    host: "localhost"
    port: 6333
    collection: "deepdoc_vectors"

  # 嵌入模型
  embedding_model:
    name: "bge-small-zh-v1.5"
    dimensions: 512

  # 检索参数
  search:
    top_k: 5
    score_threshold: 0.5
    fusion_method: "rrf"  # Reciprocal Rank Fusion

  # 关键词检索
  keyword_search:
    enabled: true
    top_k: 3

# =============================================================================
# 持续学习配置
# =============================================================================
continuous_learning:
  # 是否启用持续学习
  enabled: true

  # 反馈收集
  feedback_collection:
    enabled: true
    storage_path: "data/feedback.json"

  # 自动重训练阈值
  retrain_threshold:
    min_feedback_count: 100
    min_accuracy_drop: 0.05

  # 模型更新策略
  update_strategy: "periodic"  # periodic, on_demand, manual
  update_interval_days: 7

# =============================================================================
# 日志配置
# =============================================================================
logging:
  level: "INFO"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  file: "logs/deepdoc.log"
  max_bytes: 10485760  # 10MB
  backup_count: 5

# =============================================================================
# 其他配置
# =============================================================================
other:
  # 缓存配置
  cache:
    enabled: true
    ttl: 3600  # 秒
    max_size: 1000

  # 性能监控
  performance_monitoring:
    enabled: true
    log_slow_requests: true
    slow_request_threshold: 5  # 秒
