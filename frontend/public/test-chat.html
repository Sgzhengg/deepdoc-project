<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>聊天测试</title>
</head>
<body>
    <h1>聊天API测试</h1>
    <input type="text" id="message" placeholder="输入问题" value="29元潮玩青春卡套餐包含多少定向流量？" style="width: 500px;">
    <button onclick="testChat()">发送</button>
    <pre id="result"></pre>

    <script>
    async function testChat() {
        const message = document.getElementById('message').value;
        const result = document.getElementById('result');

        result.textContent = '发送中...';

        try {
            const response = await fetch('/api/chat', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ message: message })
            });

            result.textContent = '状态码: ' + response.status + '\n\n';

            const data = await response.json();
            result.textContent += JSON.stringify(data, null, 2);
        } catch (error) {
            result.textContent = '错误: ' + error.message;
        }
    }
    </script>
</body>
</html>
